name: Update AREDL Rankings

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch AREDL Levels
        run: |
          curl -L -o aredl-ranks.json https://api.aredl.net/v2/api/aredl/levels

      - name: Fetch AREDL User
        run: |
          curl -L -o aredl-user.json https://api.aredl.net/v2/api/aredl/users/spleen

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add aredl-ranks.json aredl-user.json

          git diff --staged --quiet || git commit -m "Update AREDL data"

          git push